       </div>\n\n                <!-- 4 Imperatives Compact -->\n                <div class=\"grid grid-cols-1 gap-3 flex-1\">\n                    \n                    <!-- Imperative 1 -->\n                    <div class=\"flex items-start imperative-item bg-slate-50 rounded-lg p-3 border-l-4 border-blue-500\">\n                        <div class=\"text-3xl font-black text-blue-200 mr-3 leading-none\">01</div>\n                        <div>\n                            <h4 class=\"text-base font-bold text-slate-800 mb-1\">Justificación de la Necesidad</h4>\n                            <p class=\"text-xs text-slate-600 leading-relaxed\">\n                                Acreditar la necesidad vinculada con fines institucionales.\n                            </p>\n                        </div>\n                    </div>\n\n                    <!-- Imperative 2 -->\n                    <div class=\"flex items-start imperative-item bg-slate-50 rounded-lg p-3 border-l-4 border-blue-500\">\n                        <div class=\"text-3xl font-black text-blue-200 mr-3 leading-none\">02</div>\n                        <div>\n                            <h4 class=\"text-base font-bold text-slate-800 mb-1\">Idoneidad del Objeto</h4>\n                            <p class=\"text-xs text-slate-600 leading-relaxed\">\n                                Objeto perfectamente definido y adecuado a la necesidad.\n                            </p>\n                        </div>\n                    </div>\n\n                    <!-- Imperative 3 -->\n                    <div class=\"flex items-start imperative-item bg-slate-50 rounded-lg p-3 border-l-4 border-blue-500\">\n                        <div class=\"text-3xl font-black text-blue-200 mr-3 leading-none\">03</div>\n                        <div>\n                            <h4 class=\"text-base font-bold text-slate-800 mb-1\">Insuficiencia de Medios</h4>\n                            <p class=\"text-xs text-slate-600 leading-relaxed\">\n                                Constancia de falta de medios propios para la ejecución.\n                            </p>\n                        </div>\n                    </div>\n\n                    <!-- Imperative 4 -->\n                    <div class=\"flex items-start imperative-item bg-slate-50 rounded-lg p-3 border-l-4 border-blue-500\">\n                        <div class=\"text-3xl font-black text-blue-200 mr-3 leading-none\">04</div>\n                        <div>\n                            <h4 class=\"text-base font-bold text-slate-800 mb-1\">Eficiencia y Economía</h4>\n                            <p class=\"text-xs text-slate-600 leading-relaxed\">\n                                Óptima utilización de fondos públicos y estabilidad presupuestaria.\n                            </p>\n                        </div>\n                    </div>\n\n                </div>\n            </div>\n\n        </div>\n    </main>\n\n    <script>\n        document.addEventListener(\"DOMContentLoaded\", () => {\n            // GSAP Animations\n            gsap.set(\"#slide-title\", { autoAlpha: 0, y: -30 });\n            gsap.set(\"#keyword-section\", { autoAlpha: 0, scale: 0.9 });\n            gsap.set(\"#concept-1, #concept-2, #concept-3\", { autoAlpha: 0, x: -30 });\n            gsap.set(\"#mnemonic-section\", { autoAlpha: 0, scale: 0.95 });\n            gsap.set(\".imperative-item\", { autoAlpha: 0, x: 30 });\n\n            const tl = gsap.timeline({ defaults: { ease: \"power3.out\" } });\n\n            tl.to(\"#slide-title\", { duration: 0.6, autoAlpha: 1, y: 0 })\n              .to(\"#keyword-section\", { duration: 0.7, autoAlpha: 1, scale: 1 }, \"-=0.3\")\n              .to(\"#concept-1\", { duration: 0.5, autoAlpha: 1, x: 0 }, \"-=0.2\")\n              .to(\"#concept-2\", { duration: 0.5, autoAlpha: 1, x: 0 }, \"-=0.3\")\n              .to(\"#concept-3\", { duration: 0.5, autoAlpha: 1, x: 0 }, \"-=0.3\")\n              .to(\"#mnemonic-section\", { duration: 0.6, autoAlpha: 1, scale: 1 }, \"-=0.4\")\n              .to(\".imperative-item\", { duration: 0.6, autoAlpha: 1, x: 0, stagger: 0.1 }, \"-=0.4\");\n        });\n    <\/script>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Definición Legal del Expediente</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"w-[1280px] h-[720px] bg-white relative flex flex-col p-12 box-border shadow-lg\">\n        \n        <!-- Page Title -->\n        <h1 class=\"text-4xl font-bold text-slate-800 mb-8 tracking-tight\" data-editable=\"text\">\n            Definición Legal del Expediente\n        </h1>\n\n        <!-- Main Content -->\n        <div class=\"flex-1 grid grid-cols-12 gap-8\">\n            \n            <!-- Left Column: Legal Definition Card -->\n            <div class=\"col-span-5 bg-slate-50 border border-slate-200 p-6 rounded-2xl shadow-sm flex flex-col\">\n                <div class=\"inline-block px-3 py-1 bg-blue-100 text-blue-800 text-xs font-semibold rounded-full mb-4 uppercase tracking-wider self-start\" data-editable=\"text\">\n                    Artículo 51 de la Ley\n                </div>\n                <p class=\"text-lg leading-relaxed text-slate-700 font-medium mb-6\" data-editable=\"text\">\n                    \"Se entiende por expediente el conjunto ordenado de documentos y actuaciones que sirven de antecedente y fundamento a la resolución administrativa, así como las diligencias encaminadas a ejecutarla.\"\n                </p>\n                \n                <!-- Keyword Box -->\n                <div class=\"mt-auto bg-amber-50 border-2 border-amber-300 rounded-xl p-4\">\n                    <div class=\"text-xs font-semibold text-amber-700 mb-1 uppercase tracking-wide\">Palabra Clave</div>\n                    <div class=\"text-3xl font-bold text-amber-800 tracking-wider\">CADENA</div>\n                    <div class=\"text-xs text-amber-600 mt-1 italic\">Secuencia ordenada y conectada</div>\n                </div>\n            </div>\n\n            <!-- Right Column: Key Concepts and Mnemonic -->\n            <div class=\"col-span-7 flex flex-col gap-6\">\n                \n                <!-- Title for concepts -->\n                <div class=\"bg-blue-600 text-white px-4 py-2 rounded-lg\">\n                    <h2 class=\"text-xl font-bold\">3 Conceptos Clave</h2>\n                </div>\n\n                <!-- Point 1 -->\n                <div class=\"flex items-start gap-4\">\n                    <div class=\"w-[44px] h-[44px] bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shrink-0 shadow-md\">\n                        1\n                    </div>\n                    <div>\n                        <h3 class=\"text-xl font-bold text-slate-800 mb-1\" data-editable=\"text\">Conjunto Ordenado</h3>\n                        <p class=\"text-base text-slate-600 leading-relaxed\" data-editable=\"text\">\n                            Los documentos deben integrarse manteniendo un estricto orden cronológico y lógico que refleje la secuencia del procedimiento.\n                        </p>\n                    </div>\n                </div>\n\n                <!-- Point 2 -->\n                <div class=\"flex items-start gap-4\">\n                    <div class=\"w-[44px] h-[44px] bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shrink-0 shadow-md\">\n                        2\n                    </div>\n                    <div>\n                        <h3 class=\"text-xl font-bold text-slate-800 mb-1\" data-editable=\"text\">Documentos y Actuaciones</h3>\n                        <p class=\"text-base text-slate-600 leading-relaxed\" data-editable=\"text\">\n                            Comprende la totalidad de pruebas, informes, notificaciones y trámites realizados durante el proceso administrativo.\n                        </p>\n                    </div>\n                </div>\n\n                <!-- Point 3 -->\n                <div class=\"flex items-start gap-4\">\n                    <div class=\"w-[44px] h-[44px] bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shrink-0 shadow-md\">\n                        3\n                    </div>\n                    <div>\n                        <h3 class=\"text-xl font-bold text-slate-800 mb-1\" data-editable=\"text\">Fundamento de Resolución</h3>\n                        <p class=\"text-base text-slate-600 leading-relaxed\" data-editable=\"text\">\n                            Constituye la base legal y fáctica indispensable sobre la cual el órgano competente dicta su decisión final.\n                        </p>\n                    </div>\n                </div>\n\n                <!-- Mnemonic Trick Box -->\n                <div class=\"mnemonic-box rounded-xl p-5 shadow-lg mt-2\">\n                    <div class=\"flex items-center gap-3 mb-3\">\n                        <svg class=\"w-6 h-6 text-yellow-300\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                            <path d=\"M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0 iv class=\"concept-card\" data-animate=\"fade-up\" style=\"animation-delay: 0.1s;\">\n                    <div class=\"concept-number\">1</div>\n                    <h3 class=\"concept-title\" data-editable=\"text\">Requerimiento del Área Usuaria</h3>\n                    <div class=\"concept-description\" data-editable=\"text\">\n                        El área usuaria identifica la necesidad y elabora el requerimiento con especificaciones técnicas claras, términos de referencia y justificación de la contratación.\n                    </div>\n                </div>\n                \n                <div class=\"concept-card\" data-animate=\"fade-up\" style=\"animation-delay: 0.2s;\">\n                    <div class=\"concept-number\">2</div>\n                    <h3 class=\"concept-title\" data-editable=\"text\">Verificación en CMN/PAC</h3>\n                    <div class=\"concept-description\" data-editable=\"text\">\n                        Se verifica que la contratación esté incluida en el Cuadro de Necesidades (CMN) y en el Plan Anual de Contrataciones (PAC), asegurando la planificación previa.\n                    </div>\n                </div>\n                \n                <div class=\"concept-card\" data-animate=\"fade-up\" style=\"animation-delay: 0.3s;\">\n                    <div class=\"concept-number\">3</div>\n                    <h3 class=\"concept-title\" data-editable=\"text\">Coordinación con DEC</h3>\n                    <div class=\"concept-description\" data-editable=\"text\">\n                        La Dirección Ejecutiva de Contrataciones (DEC) coordina con el área usuaria para consolidar el expediente de contratación y garantizar el cumplimiento normativo.\n                    </div>\n                </div>\n            </div>\n\n            <!-- Truco Mnemotécnico -->\n            <div class=\"mnemonic-section\" data-animate=\"fade-up\" style=\"animation-delay: 0.4s;\">\n                <div class=\"mnemonic-label\">🎯 Truco Mnemotécnico</div>\n                <div class=\"mnemonic-formula\">R-P-C</div>\n                <div class=\"mnemonic-explanation\">\n                    <span class=\"highlight-r\">R</span>equerimiento - \n                    <span class=\"highlight-p\">P</span>lan - \n                    <span class=\"highlight-c\">C</span>oordinar\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <script>\n        document.addEventListener(\"DOMContentLoaded\", () => {\n            gsap.from(\"[data-animate='fade-down']\", {\n                y: -30,\n                opacity: 0,\n                duration: 0.8,\n                ease: \"power2.out\"\n            });\n\n            gsap.from(\"[data-animate='fade-up']\", {\n                y: 30,\n                opacity: 0,\n                duration: 0.8,\n                stagger: 0.15,\n                ease: \"power2.out\",\n                delay: 0.3\n            });\n\n            // Animación del badge\n            gsap.from(\".keyword-badge\", {\n                scale: 0,\n                rotation: 360,\n                duration: 1,\n                ease: \"elastic.out(1, 0.5)\",\n                delay: 0.2\n            });\n\n            // Animación de los números\n            gsap.from(\".concept-number\", {\n                scale: 0,\n                rotation: 180,\n                duration: 0.6,\n                stagger: 0.1,\n                ease: \"back.out(1.7)\",\n                delay: 0.5\n            });\n        });\n    <\/script>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>El Requerimiento - Estructura Básica</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n blue-600 text-white flex items-center justify-center font-bold text-xl mb-3\">1</div>\n                    <h3 class=\"text-xl font-bold text-blue-900 mb-2\">EETT para Bienes</h3>\n                    <p class=\"text-base text-slate-700 leading-snug\">Especificaciones Técnicas que detallan características, dimensiones, materiales y estándares de calidad para productos tangibles.</p>\n                </div>\n                \n                <div class=\"bg-gradient-to-br from-green-50 to-green-100 p-5 rounded-xl border-2 border-green-300 shadow-md\" data-animate=\"fade-in\">\n                    <div class=\"w-12 h-12 rounded-full bg-green-600 text-white flex items-center justify-center font-bold text-xl mb-3\">2</div>\n                    <h3 class=\"text-xl font-bold text-green-900 mb-2\">TDR para Servicios</h3>\n                    <p class=\"text-base text-slate-700 leading-snug\">Términos de Referencia que describen alcance, metodología, entregables y plazos para servicios profesionales o consultorías.</p>\n                </div>\n\n                <div class=\"bg-gradient-to-br from-purple-50 to-purple-100 p-5 rounded-xl border-2 border-purple-300 shadow-md\" data-animate=\"fade-in\">\n                    <div class=\"w-12 h-12 rounded-full bg-purple-600 text-white flex items-center justify-center font-bold text-xl mb-3\">3</div>\n                    <h3 class=\"text-xl font-bold text-purple-900 mb-2\">Requisitos de Calificación</h3>\n                    <p class=\"text-base text-slate-700 leading-snug\">Criterios que deben cumplir los proveedores: experiencia, capacidad técnica, solvencia financiera y certificaciones.</p>\n                </div>\n            </div>\n\n            <div class=\"grid grid-cols-2 gap-6 mt-2\">\n                <div class=\"flex flex-col gap-4\" data-animate=\"fade-in-right\">\n                    <div class=\"flex items-start gap-3\">\n                        <div class=\"w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg shrink-0\">1</div>\n                        <div>\n                            <h3 class=\"text-lg font-semibold text-slate-800 mb-1\">Identificador Único</h3>\n                            <p class=\"text-sm text-slate-600 leading-relaxed\">Código de referencia para rastrear el requerimiento (ej. REQ-001).</p>\n                        </div>\n                    </div>\n                    \n                    <div class=\"flex items-start gap-3\">\n                        <div class=\"w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg shrink-0\">2</div>\n                        <div>\n                            <h3 class=\"text-lg font-semibold text-slate-800 mb-1\">Nombre y Descripción</h3>\n                            <p class=\"text-sm text-slate-600 leading-relaxed\">Título claro y descripción detallada, evitando ambigüedades.</p>\n                        </div>\n                    </div>\n\n                    <div class=\"flex items-start gap-3\">\n                        <div class=\"w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-lg shrink-0\">3</div>\n                        <div>\n                            <h3 class=\"text-lg font-semibold text-slate-800 mb-1\">Criterios de Aceptación</h3>\n                            <p class=\"text-sm text-slate-600 leading-relaxed\">Condiciones específicas para validar el cumplimiento del requerimiento.</p>\n                        </div>\n                    </div>\n                </div>\n\n                <div class=\"flex flex-col gap-4\" data-animate=\"fade-in-left\">\n                    <div class=\"bg-slate-50 p-5 rounded-xl border border-slate-200\">\n                        <h3 class=\"text-lg font-bold text-slate-800 mb-3 border-b border-slate-200 pb-2\">Atributos Adicionales</h3>\n                        \n                        <ul class=\"flex flex-col gap-2 text-sm text-slate-700\">\n                            <li class=\"flex items-center gap-2\">\n                                <span class=\"w-2 h-2 rounded-full bg-blue-500\"></span>\n                                <strong>Prioridad:</strong> Alta, Media, Baja\n                            </li>\n                            <li class=\"flex items-center gap-2\">\n                                <span class=\"w-2 h-2 rounded-full bg-blue-500\"></span>\n                                <strong>Estado:</strong> Propuesto, Aprobado, Implementado\n                            </li>\n                            <li class=\"flex items-center gap-2\">\n                                <span class=\"w-2 h-2 rounded-full bg-blue-500\"></span>\n                                <strong>Autor/Fuente:</strong> Quién solicitó el requerimiento\n                            </li>\n                            <li class=\"flex items-center gap-2\">\n                                <span class=\"w-2 h-2 rounded-full bg-blue-500\"></span>\n                                <strong>Dependencias:</strong> Relación con otros requerimientos\n                            </li>\n                        </ul>\n                    </div>\n\n                    <div class=\"mnemonic-box\">\n                        <h4 class=\"text-base font-bold text-amber-900 mb-2 flex items-center gap-2\">\n                            <span class=\"text-2xl\">💡</span>\n                            Truco Mnemotécnico: 5W1H\n                        </h4>\n                        <p class=\"text-sm font-semibold text-amber-800 leading-relaxed\">\n                            <span class=\"text-amber-900\">Qué</span> · <span class=\"text-amber-900\">Por qué</span> · <span class=\"text-amber-900\">Dónde</span> · <span class=\"text-amber-900\">Cuándo</span> · <span class=\"text-amber-900\">Quién</span> · <span class=\"text-amber-900\">Cómo</span>\n                        </p>\n                        <p class=\"text-xs text-amber-700 mt-2 italic\">\n                            Usa estas preguntas para asegurar requerimientos completos\n                        </p>\n                    </div>\n                </div>\n            </div>\n        </main>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Verificaciones Previas al Requerimiento</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');\n        \n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #e5e7eb;\n        }\n        \n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background-color: #ffffff;\n            position: relative;\n            box-sizing: border-box;\n            padding: 60px 80px;\n            display: flex;\n            flex-direction: column;\n            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);\n        }\n\n        .keyword-badge {\n            display: inline-block;\n            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);\n            color: white;\n            padding: 8px 24px;\n            border-radius: 20px;\n            font-size: 0.9rem;\n            font-weight: 600;\n            letter-spacing: 2px;\n            box-shadow: 0 4px 6px rgba(59, 130, 246, 0.3);\n        }\n\n        .mnemonic-box {\n            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);\n            border-left: 4px solid #f59e0b;\n            padding: 16px 20px;\n            border-radius: 8px;\n            box-shado                 </p>\n            </div>\n            \n            <!-- Item 3 -->\n            <div class=\"flex flex-col\">\n                <div class=\"w-16 h-16 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center text-2xl font-bold mb-6 border-2 border-purple-200\">\n                    3\n                </div>\n                <h2 class=\"text-xl font-semibold text-gray-800 mb-3\" data-editable=\"text\">Evitar Direccionamiento</h2>\n                <p class=\"text-base text-gray-600 leading-relaxed\" data-editable=\"text\">\n                    Asegurar que las especificaciones técnicas sean objetivas, genéricas y no favorezcan a un proveedor específico, garantizando la libre competencia y transparencia del proceso.\n                </p>\n            </div>\n        </main>\n\n        <!-- Mnemonic Section -->\n        <div class=\"mnemonic-box\">\n            <div class=\"flex items-center\">\n                <svg class=\"w-6 h-6 text-amber-600 mr-3 flex-shrink-0\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                    <path d=\"M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z\"></path>\n                </svg>\n                <div>\n                    <span class=\"font-semibold text-gray-800 text-base\">Truco Mnemotécnico:</span>\n                    <span class=\"text-gray-700 text-base ml-2\"><strong>A-H-N</strong> = <strong>A</strong>cuerdo marco - <strong>H</strong>istorial - <strong>N</strong>o direccionar</span>\n                </div>\n            </div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Requisitos de Calificación</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            width: 1280px;\n            height: 720px;\n            background-color: #f8fafc;\n        }\n    </style>\n</head>\n<body class=\"w-[1280px] h-[720px] bg-slate-50 text-slate-800 flex justify-center items-center\">\n    <main class=\"w-full h-full p-16 flex flex-col gap-8 box-border\">\n        \n        <!-- Page Title -->\n        <div class=\"w-full\">\n            <h1 class=\"text-5xl font-bold text-slate-900 tracking-tight\" data-editable=\"text\">Requisitos de Calificación</h1>\n            <div class=\"w-24 h-1 bg-blue-600 mt-6\"></div>\n        </div>\n\n        <!-- Keyword Section -->\n        <div class=\"w-full bg-gradient-to-r from-blue-600 to-blue-500 rounded-xl p-6 shadow-lg\">\n            <div class=\"flex items-center gap-4\">\n                <div class=\"w-16 h-16 rounded-full bg-white flex items-center justify-center\">\n                    <span class=\"text-3xl\">🎯</span>\n                </div>\n                <div>\n                    <p class=\"text-sm font-semibold text-blue-100 uppercase tracking-wide\">Palabra Clave</p>\n                    <h2 class=\"text-4xl font-bold text-white\">CAPACIDAD</h2>\n                </div>\n            </div>\n        </div>\n\n        <!-- Mnemonic Trick -->\n        <div class=\"w-full bg-amber-50 border-l-4 border-amber-500 rounded-lg p-5 shadow-sm\">\n            <div class=\"flex items-start gap-3\">\n                <span class=\"text-2xl\">💡</span>\n                <div>\n                    <p class=\"text-sm font-semibold text-amber-800 uppercase tracking-wide mb-1\">Truco Mnemotécnico</p>\n                    <p class=\"text-xl font-bold text-amber-900\">PUEDE-SABE-HIZO = Legal-Técnico-Experiencia</p>\n                </div>\n            </div>\n        </div>\n\n        <!-- Content: Three Key Concepts -->\n        <div class=\"flex flex-row gap-8 flex-1\">\n            \n            <!-- Concept 1: Capacidad Legal -->\n            <div class=\"flex-1 flex flex-col gap-4 bg-white rounded-xl p-6 shadow-md border border-slate-200\">\n                <div class=\"flex items-center gap-3 mb-2\">\n                    <div class=\"w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl font-bold\">\n                        1\n                    </div>\n                    <div class=\"flex-1\">\n                        <p class=\"text-xs font-semibold text-blue-600 uppercase tracking-wide\">PUEDE</p>\n                        <h2 class=\"text-2xl font-bold text-slate-900\" data-editable=\"text\">Capacidad Legal</h2>\n                    </div>\n                </div>\n                <ul class=\"flex flex-col gap-3 text-base text-slate-700 list-disc pl-5\">\n                    <li data-editable=\"text\">Certificados de estar al día con obligaciones tributarias y laborales</li>\n                    <li data-editable=\"text\">Licencias y permisos operativos vigentes según normativa</li>\n                    <li data-editable=\"text\">Políticas de anticorrupción y prevención de lavado de activos</li>\n                </ul>\n            </div>\n\n            <!-- Concept 2: Capacidad Técnica/Profesional -->\n            <div class=\"flex-1 flex flex-col gap-4 bg-white rounded-xl p-6 shadow-md border border-slate-200\">\n                <div class=\"flex items-center gap-3 mb-2\">\n                    <div class=\"w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl font-bold\">\n                        2\n                    </div>\n                    <div class=\"flex-1\">\n                        <p class=\"text-xs font-semibold text-blue-600 uppercase tracking-wide\">SABE</p>\n                        <h2 class=\"text-2xl font-bold text-slate-900\" data-editable=\"text\">Capacidad Técnica/Profesional</h2>\n                    </div>\n                </div>\n                <ul class=\"flex flex-col gap-3 text-base text-slate-700 list-disc pl-5\">\n                    <li data-editable=\"text\">Equipo profesional calificado con certificaciones vigentes</li>\n                    <li data-editable=\"text\">Infraestructura técnica y recursos especializados disponibles</li>\n                    <li data-editable=\"text\">Metodologías y sistemas de gestión de calidad implementados</li>\n                </ul>\n            </div>\n\n            <!-- Concept 3: Experiencia Similar -->\n            <div class=\"flex-1 flex flex-col gap-4 bg-white rounded-xl p-6 shadow-md border border-slate-200\">\n                <div class=\"flex items-center gap-3 mb-2\">\n                    <div class=\"w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-2xl font-bold\">\n                        3\n                    </div>\n                    <div class=\"flex-1\">\n                        <p class=\"text-xs font-semibold text-blue-600 uppercase tracking-wide\">HIZO</p>\n                        <h2 class=\"text-2xl font-bold text-slate-900\" data-editable=\"text\">Experiencia Similar</h2>\n                    </div>\n                </div>\n                <ul class=\"flex flex-col gap-3 text-base text-slate-700 list-disc pl-5\">\n                    <li data-editable=\"text\">Historial comprobado en proyectos de escala y complejidad similar</li>\n                    <li data-editable=\"text\">Mínimo 5 años de operación continua en el sector específico</li>\n                    <li data-editable=\"text\">Referencias verificables de al menos tres clientes recientes</li>\n                </ul>\n            </div>\n\n        </div>\n    </main>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Modificaciones al Requerimiento</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            position: relative;\n            box-sizing: border-box;\n            padding: 50px 70px;\n            display: flex;\n            flex-direction: column;\n            box-shadow: 0 10px 30px rgba(0,0,0,0.1);\n            overflow: hidden;\n        }\n        .keyword-badge {\n            display: inline-block;\n            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);\n            color: #1f2937;\n            padding: 8px 24px;\n            border-radius: 25px;\n            font-weight: 800;\n            font-size: 1.1rem;\n            letter-spacing: 2px;\n            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.4);\n        }\n        .concept-card {\n            background: rgba(255, 255, 255, 0.95);\n            border-radius: 16px;\n            padding: 24px;\n            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);\n            transition: transform 0.3s ease;\n        }\n        .concept-card:hover {\n            transform: translateY(-5px);\n        }\n        .concept-number {\n            width: 50px;\n            height: 50px;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            color: white;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-weight: 700;\n            font-size: 1.5rem;\n            flex-shrink: 0;\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #10b981 0%, #059669 100%);\n            border-radius: 20px;\n            padding: 20px 30px;\n            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);\n        }\n        .mnemonic-formula {\n            font-size: 1.8rem;\n            font-weight: 800;\n            color: white;\n            text-align: center;\n            letter-spacing: 3px;\n        }\n        .mnemonic-explanation {\n            font-size: 1.1rem;\n            color: #d1fae5;\n            text-align: center;\n            margin-top: 8px;\n            font-weight: 600;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <!-- Header with Title and Keyword -->\n        <div class=\"mb-8\">\n            <div class=\"flex items-center justify-between mb-4\">\n                <h1 class=\"text-5xl font-bold text-white tracking-tight\" data-editable=\"text\">Modificaciones al Requerimiento</h1>\n                <span class=\"keyword-badge\">CAMBIO</span>\n            </div>\n            <div class=\"h-1 w-32 bg-yellow-400 rounded-full\"></div>\n        </div>\n        \n        <!-- Main Content - 3 Key Concepts -->\n        <main class=\"flex-1 flex flex-col gap-5\">\n            <!-- Concept 1 -->\n            <div class=\"concept-card\">\n                <div class=\"flex items-start gap-5\">\n                    <div class=\"concept-number\">1</div>\n                    <div class=\"flex-1\">\n                        <h2 class=\"text-2xl font-bold text-gray-800 mb-2\" data-editable=\"text\">Mejora por Interacción con Mercado</h2>\n                        <p class=\"text-lg text-gray-700 leading-relaxed\" data-editable=\"text\">Ajustes realizados después de recibir retroalimentación del mercado y usuarios finales, optimizando el requerimiento para satisfacer necesidades reales detectadas durante la fase de interacción.</p>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Concept 2 -->\n            <div class=\"concept-card\">\n                <div class=\"flex items-start gap-5\">\n                    <div class=\"concept-number\">2</div>\n                    <div class=\"flex-1\">\n                        <h2 class=\"text-2xl font-bold text-gray-800 mb-2\" data-editable=\"text\">Modificación por Consultas</h2>\n                        <p class=\"text-lg text-gray-700 leading-relaxed\" data-editable=\"text\">Cambios derivados de las consultas y aclaraciones solicitadas por los participantes durante el proceso, que requieren ajustes en las especificaciones originales del requerimiento.</p>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Concept 3 -->\n            <div class=\"concept-card\">\n                <div class=\"flex items-start gap-5\">\n                    <div class=\"concept-number\">3</div>\n                    <div class=\"flex-1\">\n                        <h2 class=\"text-2xl font-bold text-gray-800 mb-2\" data-editable=\"text\">Aprobación del Mismo Órgano</h2>\n                        <p class=\"text-lg text-gray-700 leading-relaxed\" data-editable=\"text\">Toda modificación debe ser aprobada por el mismo órgano que aprobó el requerimiento original, manteniendo la coherencia y autoridad en el proceso de cambios.</p>\n                    </div>\n                </div>\n            </div>\n        </main>\n\n        <!-- Mnemonic Trick Box -->\n        <div class=\"mnemonic-box mt-6\">\n            <div class=\"mnemonic-formula\">M-C-A</div>\n            <div class=\"mnemonic-explanation\">Mercado · Consultas · Aprobación</div>\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Estructura del Expediente</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <script src=\"assets/4a57399e4113.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            background-color: #f3f4f6;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n        }\n        * {\n            transition: none !important;\n            animation: none !important;\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n        }\n    </style>\n</head>\n<body>\n    <!-- Slide Container: 1280x720 -->\n    <main class=\"w-[1280px] h-[720px] bg-white relative p-12 box-border flex flex-col shadow-2xl\">\n        \n        <!-- Page Title with Keyword -->\n        <div class=\"mb-8\" data-animate=\"fade-down\">\n            <h1 class=\"text-5xl font-bold text-slate-800 mb-2\">Estructura del Expediente</h1>\n            <div class=\"inline-block bg-blue-600 text-white px-6 py-2 rounded-full text-lg font-semibold\">\n                Palabra Clave: ESTRUCTURA\n            </div>\n        </div>\n\n        <!-- Content Section -->\n        <div class=\"flex-1 flex gap-6\">\n            \n            <!-- Left Column: 3 Key Concepts -->\n            <div class=\"flex-1 flex flex-col gap-4\">\n                \n                <!-- Concept 1: Documentos de Inicio -->\n                <div class=\"bg-gradient-to-r from-blue-50 to-blue-100 p-5 rounded-xl border-l-4 border-blue-600\" data-animate=\"fade-up\" data-delay=\"0.2\">\n                    <div class=\"flex items-center gap-3 mb-3\">\n                        <div class=\"w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center text-xl font-bold\">I</div>\n                        <h2 class=\"text-2xl font-bold text-slate-800\">Documentos de Inicio</h2>\n                    </div>\n                    <ul class=\"list-disc list-inside text-slate-700 space-y-1 text-base ml-2\">\n                        <li>Memoria justificativa del contrato</li>\n                        <li>Pliego de Prescripciones Técnicas (PPT)</li>\n                        <li>Pliego de Cláusulas Administrativas (PCAP)</li>\n                        <li>Certificado de existencia de crédito</li>\n                    </ul>\n                </div>\n\n                <!-- Concept 2: Documentos del Proceso -->\n                <div class=\"bg-gradient-to-r from-green-50 to-green-100 p-5 rounded-xl border-l-4 border-green-600\" data-animate=\"fade-up\" data-delay=\"0.4\">\n                    <div class=\"flex items-center gap-3 mb-3\">\n                        <div class=\"w-12 h-12 bg-green-600 text-white rounded-full flex items-center justify-center text-xl font-bold\">P</div>\n                        <h2 class=\"text-2xl font-bold text-slate-800\">Documentos del Proceso</h2>\n                    </div>\n                    <ul class=\"list-disc list-inside text-slate-700 space-y-1 text-base ml-2\">\n                        <li>Publicación del anuncio de licitación</li>\n                        <li>Actas de la Mesa de Contratación</li>\n                        <li>Informes de valoración de ofertas</li>\n                        <li>Propuesta de adjudicación</li>\n                    </ul>\n                </div>\n\n                <!-- Concept 3: Documentos de Resultado -->\n                <div class=\"bg-gradient-to-r from-purple-50 to-purple-100 p-5 rounded-xl border-l-4 border-purple-600\" data-animate=\"fade-up\" data-delay=\"0.6\">\n                    <div class=\"flex items-center gap-3 mb-3\">\n                        <div class=\"w-12 h-12 bg-purple-600 text-white rounded-full flex items-center justify-center text-xl font-bold\">R</div>\n                        <h2 class=\"text-2xl font-bold text-slate-800\">Documentos de Resultado</h2>\n                    </div>\n                    <ul class=\"list-disc list-inside text-slate-700 space-y-1 text-base ml-2\">\n                        <li>Requerimiento de documentación</li>\n                        <li>Resolución de adjudicación</li>\n                        <li>Notificación a los candidatos</li>\n                        <li>Documento de formalización del contrato</li>\n                    </ul>\n                </div>\n\n            </div>\n\n            <!-- Right Column: Mnemonic Trick -->\n            <div class=\"w-80 flex flex-col justify-center\" data-animate=\"fade-left\" data-delay=\"0.8\">\n                <div class=\"mnemonic-box p-8 rounded-2xl shadow-xl text-white\">\n                    <div class=\"text-center mb-6\">\n                        <div class=\"text-3xl font-bold mb-2\">💡 Truco Mnemotécnico</div>\n                        <div class=\"w-16 h-1 bg-white mx-auto rounded\"></div>\n                    </div>\n                    \n                    <div class=\"bg-white bg-opacity-20 rounded-xl p-6 mb-4\">\n                        <div class=\"text-5xl font-bold text-center mb-4\">I - P - R</div>\n                        <div class=\"text-center text-lg leading-relaxed\">\n                            <div class=\"mb-2\"><span class=\"font-bold text-2xl\">I</span>nicio</div>\n                            <div class=\"mb-2\"><span class=\"font-bold text-2xl\">P</span>roceso</div>\n                            <div><span class=\"font-bold text-2xl\">R</span>esultado</div>\n                        </div>\n                    </div>\n                    \n                    <div class=\"text-center text-sm italic\">\n                        \"Todo expediente sigue el ciclo I-P-R: se inicia, se procesa y se obtiene un resultado\"\n                    </div>\n                </div>\n            </div>\n\n        </div>\n    </main>\n\n    <script>\n        document.addEventListener(\"DOMContentLoaded\", () => {\n            // GSAP Animations\n            const elements = document.querySelectorAll('[data-animate]');\n            \n            elements.forEach(el => {\n                const animationType = el.getAttribute('data-animate');\n                const delay = parseFloat(el.getAttribute('data-delay')) || 0;\n                \n                // Initial state\n                gsap.set(el, { opacity: 0 });\n\n                if (animationType === 'fade-down') {\n                    gsap.fromTo(el, \n                        { y: -30, opacity: 0 },\n                        { y: 0, opacity: 1, duration: 0.8, delay: delay, ease: \"power2.out\" }\n                    );\n                } else if (animationType === 'fade-up') {\n                    gsap.fromTo(el, \n                        { y: 30, opacity: 0 },\n                        { y: 0, opacity: 1, duration: 0.8, delay: delay, ease: \"power2.out\" }\n                    );\n                } else if (animationType === 'fade-left') {\n                    gsap.fromTo(el, \n                        { x: 30, opacity: 0 },\n                        { x: 0, opacity: 1, duration: 0.8, delay: delay, ease: \"power2.out\" }\n                    );\n                } else {\n                    gsap.to(el, { opacity: 1, duration: 0.8, delay: delay });\n                }\n            });\n        });\n    <\/script>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Contenido para BIENES</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n    </style>\n</head>\n<body>\n    <main class=\"w-[1280px] h-[720px] bg-white relative flex flex-col p-12 box-border shadow-2xl\">\n        \n        <!-- Page Title with Keyword -->\n        <div class=\"mb-8\">\n            <h1 class=\"text-4xl font-bold text-gray-900 tracking-tight\">Contenido para BIENES</h1>\n            <div class=\"mt-3 inline-block px-5 py-2 bg-amber-100 border-l-4 border-amber-500 rounded\">\n                <span class=\"text-lg font-semibold text-amber-900\">Palabra Clave: ESPECIFICACIONES</span>\n            </div>\n        </div>\n\n        <!-- Content Layout -->\n        <div class=\"grid grid-cols-2 gap-12 flex-1\">\n            \n            <!-- Left Column: 3 Key Concepts -->\n            <div class=\"flex flex-col gap-6\">\n                \n                <!-- Concept 1 -->\n                <div class=\"flex flex-col gap-2 p-5 bg-blue-50 border-l-4 border-blue-600 rounded-lg\">\n                    <h2 class=\"text-xl font-bold text-blue-800 flex items-center gap-2\">\n                        <span class=\"flex items-center justify-center w-8 h-8 rounded-full bg-blue-600 text-white font-bold text-sm\">1</span>\n                        EETT: Especificaciones Técnicas\n                    </h2>\n                    <p class=\"text-base text-gray-700 leading-relaxed pl-10\">\n                        Descripción detallada de las características físicas, técnicas y funcionales del bien. Incluye dimensiones, materiales, capacidades, rendimiento y estándares de calidad que debe cumplir el producto.\n                    </p>\n                </div>\n\n                <!-- Concept 2 -->\n                <div class=\"flex flex-col gap-2 p-5 bg-green-50 border-l-4 border-green-600 rounded-lg\">\n                    <h2 class=\"text-xl font-bold text-green-800 flex items-center gap-2\">\n                        <span class=\"flex items-center justify-center w-8 h-8 rounded-full bg-green-600 text-white font-bold text-sm\">2</span>\n                        Condiciones de Entrega y Recepción\n                    </h2>\n                    <p class=\"text-base text-gray-700 leading-relaxed pl-10\">\n                        Términos específicos sobre plazos, lugares de entrega, embalaje, transporte y procedimientos de recepción. Define responsabilidades del proveedor y criterios de aceptación del bien.\n                    </p>\n                </div>\n\n                <!-- Concept 3 -->\n                <div class=\"flex flex-col gap-2 p-5 bg-purple-50 border-l-4 border-purple-600 rounded-lg\">\n                    <h2 class=\"text-xl font-bold text-purple-800 flex items-center gap-2\">\n                        <span class=\"flex items-center justify-center w-8 h-8 rounded-full bg-purple-600 text-white font-bold text-sm\">3</span>\n                        Requisitos de Calificación Específicos\n                    </h2>\n                    <p class=\"text-base text-gray-700 leading-relaxed pl-10\">\n                        Criterios que deben cumplir los proveedores: certificaciones, experiencia previa, capacidad técnica, financiera y legal. Garantiza que solo oferentes calificados participen en el proceso.\n                    </p>\n                </div>\n\n            </div>\n\n            <!-- Right Column: Mnemonic & Visual -->\n            <div class=\"flex flex-col gap-6 justify-center\">\n                \n                <!-- Mnemonic Trick -->\n                <div class=\"p-6 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-2xl shadow-xl\">\n                    <h3 class=\"text-2xl font-bold text-white mb-4 text-center\">🧠 Truco Mnemotécnico</h3>\n                    <div class=\"bg-white bg-opacity-20 backdrop-blur-sm rounded -family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background-color: #ffffff;\n            position: relative;\n            box-shadow: 0 10px 25px rgba(0,0,0,0.1);\n            overflow: hidden;\n        }\n        .keyword-highlight {\n            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);\n            -webkit-background-clip: text;\n            -webkit-text-fill-color: transparent;\n            background-clip: text;\n            font-weight: 800;\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);\n            border: 3px solid #3b82f6;\n        }\n        .concept-card {\n            transition: transform 0.3s ease, box-shadow 0.3s ease;\n        }\n        .concept-card:hover {\n            transform: translateY(-5px);\n            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);\n        }\n    </style>\n</head>\n<body>\n\n    <div class=\"slide-container\">\n        <main class=\"w-full h-full p-12 flex flex-col gap-6 box-border\">\n            \n            <!-- Page Title with Keyword -->\n            <div class=\"gsap-title text-center\">\n                <h1 class=\"text-5xl font-bold text-slate-900 tracking-tight mb-3\" data-editable=\"text\">\n                    <span class=\"keyword-highlight\">AUTORIDAD</span> que Aprueba\n                </h1>\n                <h2 class=\"text-xl font-normal text-slate-600\" data-editable=\"text\">Procedimientos no competitivos - Formato Educativo</h2>\n            </div>\n\n            <!-- 3 Key Concepts -->\n            <div class=\"grid grid-cols-3 gap-6 mt-4\">\n                \n                <!-- Concept 1: AGA -->\n                <div class=\"gsap-concept concept-card bg-gradient-to-br from-blue-50 to-white border-2 border-blue-200 rounded-xl p-6 flex flex-col\">\n                    <div class=\"flex items-center gap-3 mb-4\">\n                        <div class=\"w-14 h-14 rounded-full bg-blue-500 flex items-center justify-center flex-shrink-0\">\n                            <span class=\"text-white font-bold text-2xl\">A</span>\n                        </div>\n                        <h3 class=\"text-2xl font-bold text-blue-900\" data-editable=\"text\">AGA</h3>\n                    </div>\n                    <h4 class=\"text-lg font-semibold text-slate-800 mb-3\" data-editable=\"text\">Aprueba Casos Comunes</h4>\n                    <p class=\"text-base text-slate-700 leading-relaxed flex-1\" data-editable=\"text\">\n                        La Autoridad General Administrativa (AGA) tiene competencia para aprobar contrataciones no competitivas en situaciones estándar y dentro de los umbrales establecidos.\n                    </p>\n                    <div class=\"mt-4 pt-4 border-t border-blue-200\">\n                        <span class=\"text-sm font-semibold text-blue-700\" data-editable=\"text\">✓ Casos rutinarios</span>\n                    </div>\n                </div>\n\n                <!-- Concept 2: Titular -->\n                <div class=\"gsap-concept concept-card bg-gradient-to-br from-indigo-50 to-white border-2 border-indigo-200 rounded-xl p-6 flex flex-col\">\n                    <div class=\"flex items-center gap-3 mb-4\">\n                        <div class=\"w-14 h-14 rounded-full bg-indigo-600 flex items-center justify-center flex-shrink-0\">\n                            <span class=\"text-white font-bold text-2xl\">T</span>\n                        </div>\n                        <h3 class=\"text-2xl font-bold text-indigo-900\" data-editable=\"text\">Titular</h3>\n                    </div>\n                    <h4 class=\"text-lg font-semibold text-slate-800 mb-3\" data-editable=\"text\">Aprueba Casos Especiales</h4>\n                    <p class=\"text-base text-slate-700 leading-relaxed flex-1\" data-editable=\"text\">\n                        El Titular de la entidad debe aprobar personalmente las contrataciones no competitivas que excedan umbrales específicos o presenten características excepcionales.\n                    </p>\n                    <div class=\"mt-4 pt-4 border-t border-indigo-200\">\n                        <span class=\"text-sm font-semibold text-indigo-700\" data-editable=\"text\">✓ Casos excepcionales</span>\n                    </div>\n                </div>\n\n                <!-- Concept 3: Responsabilidad -->\n                <div class=\"gsap-concept concept-card bg-gradient-to-br from-purple-50 to-white border-2 border-purple-200 rounded-xl p-6 flex flex-col\">\n                    <div class=\"flex items-center gap-3 mb-4\">\n                        <div class=\"w-14 h-14 rounded-full bg-purple-600 flex items-center justify-center flex-shrink-0\">\n                            <span class=\"text-white font-bold text-2xl\">R</span>\n                        </div>\n                        <h3 class=\"text-2xl font-bold text-purple-900\" data-editable=\"text\">Responsabilidad</h3>\n                    </div>\n                    <h4 class=\"text-lg font-semibold text-slate-800 mb-3\" data-editable=\"text\">Indelegable</h4>\n                    <p class=\"text-base text-slate-700 leading-relaxed flex-1\" data-editable=\"text\">\n                        La responsabilidad final por la aprobación de contrataciones no competitivas es indelegable, recayendo siempre en la autoridad que firma la autorización.\n                    </p>\n                    <div class=\"mt-4 pt-4 border-t border-purple-200\">\n                        <span class=\"text-sm font-semibold text-purple-700\" data-editable=\"text\">✓ Accountability total</span>\n                    </div>\n                </div>\n\n            </div>\n\n            <!-- Mnemonic Trick Box -->\n            <div class=\"gsap-mnemonic mnemonic-box rounded-2xl p-8 mt-4\">\n                <div class=\"flex items-center justify-between gap-8\">\n                    <div class=\"flex-1\">\n                        <h3 class=\"text-2xl font-bold text-blue-900 mb-3\" data-editable=\"text\">\n                            🎯 Truco Mnemotécnico\n                        </h3>\n                        <p class=\"text-lg text-slate-700 leading-relaxed\" data-editable=\"text\">\n                            Recuerda fácilmente los 3 conceptos clave con esta fórmula simple:\n                        </p>\n                    </div>\n                    <div class=\"flex items-center gap-6 bg-white rounded-xl px-10 py-6 shadow-lg\">\n                        <div class=\"text-center\">\n                            <div class=\"text-5xl font-extrabold text-blue-600 mb-1\">A</div>\n                            <div class=\"text-sm font-semibold text-slate-600\">AGA</div>\n                        </div>\n                        <div class=\"text-4xl font-bold text-slate-400\">-</div>\n                        <div class=\"text-center\">\n                            <div class=\"text-5xl font-extrabold text-indigo-600 mb-1\">T</div>\n                            <div class=\"text-sm font-semibold text-slate-600\">Titular</div>\n                        </div>\n                        <div class=\"text-4xl font-bold text-slate-400\">-</div>\n                        <div class=\"text-center\">\n                            <div class=\"text-5xl font-extrabold text-purple-600 mb-1\">R</div>\n                            <div class=\"text-sm font-semibold text-slate-600\">Responsabilidad</div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Bottom Note -->\n            <div class=\"gsap-note text-center mt-2\">\n                <p class=\"text-sm text-slate-500 italic\" data-editable=\"text\">\n                    La correcta identificación de la autoridad competente es fundamental para la validez del proceso\n                </p>\n            </div>\n\n        </main>\n    </div>\n\n    <script>\n        document.addEventListener(\"DOMContentLoaded\", () => {\n            // Set initial states for GSAP\n            gsap.set(\".gsap-title\", { opacity: 0, y: -40 });\n            gsap.set(\".gsap-concept\", { opacity: 0, y: 30, scale: 0.95 });\n            gsap.set(\".gsap-mnemonic\", { opacity: 0, scale: 0.9 });\n            gsap.set(\".gsap-note\", { opacity: 0 });\n\n            // Animate elements\n            const tl = gsap.timeline();\n            \n            tl.to(\".gsap-title\", {\n                opacity: 1,\n                y: 0,\n                duration: 0.8,\n                ease: \"power3.out\"\n            })\n            .to(\".gsap-concept\", {\n                opacity: 1,\n                y: 0,\n                scale: 1,\n                duration: 0.6,\n                stagger: 0.15,\n                ease: \"back.out(1.2)\"\n            }, \"-=0.3\")\n            .to(\".gsap-mnemonic\", {\n                opacity: 1,\n                scale: 1,\n                duration: 0.7,\n                ease: \"elastic.out(1, 0.5)\"\n            }, \"-=0.2\")\n            .to(\".gsap-note\", {\n                opacity: 1,\n                duration: 0.5,\n                ease: \"power2.out\"\n            }, \"-=0.3\");\n        });\n    <\/script>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Elementos de la Aprobación</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #e5e7eb;\n        }\n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background-color: #ffffff;\n            position: relative;\n            box-sizing: border-box;\n            padding: 60px 80px;\n            display: flex;\n            flex-direction: column;\n        }\n        .keyword-badge {\n            display: inline-block;\n            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);\n            color: white;\n            padding: 8px 24px;\n            border-radius: 20px;\n            font-weight: 600;\n            font-size: 1rem;\n            letter-spacing: 2px;\n            box-shadow: 0 4px 6px rgba(99, 102, 241, 0.3);\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);\n            border-left: 5px solid #f59e0b;\n            padding: 20px 24px;\n            border-radius: 8px;\n            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.2);\n        }\n    </style>\n</head>\n<body>\n    <main class=\"slide-container\">\n        <!-- Page Title with Keyword -->\n        <div class=\"mb-12\">\n            <h1 class=\"text-4xl font-bold text-gray-900 mb-4 tracking-tight\" data-editable=\"text\">Elementos de la Aprobación</h1>\n            <div class=\"flex items-center gap-3\">\n                <span class=\"text-lg text-gray-600 font-medium\">Palabra clave:</span>\n                <span class=\"keyword-badge\">RASTRO</span>\n            </div>\n        </div>\n        \n        <!-- Content Grid -->\n        <div class=\"grid grid-cols-3 gap-12 mb-8\">\n            \n            <!-- Element 1 -->\n            <div class=\"flex flex-col\">\n                <div class=\"w-14 h-14 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl font-bold mb-6\">\n                    1\n                </div>\n                <h2 class=\"text-xl font-semibold text-gray-800 mb-3\" data-editable=\"text\">Tipo de documento</h2>\n                <p class=\"text-base text-gray-600 leading-relaxed\" data-editable=\"text\">\n                    Clasificación específica del documento que requiere aprobación, determinando el proceso y nivel de autorización necesario según su naturaleza y alcance organizacional.\n                </p>\n            </div>\n            \n            <!-- Element 2 -->\n            <div class=\"flex flex-col\">\n                <div class=\"w-14 h-14 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl font-bold mb-6\">\n                    2\n                </div>\n                <h2 class=\"text-xl font-semibold text-gray-800 mb-3\" data-editable=\"text\">Datos esenciales</h2>\n                <p class=\"text-base text-gray-600 leading-relaxed\" data-editable=\"text\">\n                    Información crítica que debe incluirse en toda aprobación: número de identificación, fecha de emisión, base legal o normativa aplicable, y contexto relevante del documento.\n                </p>\n            </div>\n            \n            <!-- Element 3 -->\n            <div class=\"flex flex-col\">\n                <div class=\"w-14 h-14 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center text-xl font-bold mb-6\">\n                    3\n                </div>\n                <h2 class=\"text-xl font-semibold text-gray-800 mb-3\" data-editable=\"text\">Responsable de aprobación</h2>\n                <p class=\"text-base text-gray-600 leading-relaxed\" data-editable=\"text\">\n                    Persona o autoridad designada con la competencia y facultad legal para emitir la aprobación final, asumiendo la responsabilidad sobre la decisión tomada.\n                </p>\n            </div>\n\n        </div>\n\n        <!-- Mnemonic Trick Section -->\n        <div class=\"mnemonic-box mt-auto\">\n            <div class=\"flex items-center gap-4\">\n                <div class=\"flex-shrink-0\">\n                    <svg class=\"w-8 h-8 text-amber-600\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                        <path d=\"M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z\"></path>\n                    </svg>\n                </div>\n                <div class=\"flex-grow\">\n                    <p class=\"text-lg font-bold text-gray-900 mb-1\">💡 Truco Mnemotécnico</p>\n                    <p class=\"text-base text-gray-800\">\n                        <span class=\"font-bold text-amber-700\">N-F-B-R</span> = \n                        <span class=\"font-semibold\">Número</span> - \n                        <span class=\"font-semibold\">Fecha</span> - \n                        <span class=\"font-semibold\">Base</span> - \n                        <span class=\"font-semibold\">Responsable</span>\n                    </p>\n                </div>\n            </div>\n        </div>\n    </main>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Registro en Pladicop</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <link href=\"assets/2832c0ff631d.css\" rel=\"stylesheet\">\n    <style>\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n        .slide-container {\n            width: 1280px;\n            height: 720px;\n            background-color: #ffffff;\n            position: relative;\n            box-shadow: 0 10px 30px rgba(0,0,0,0.1);\n            display: flex;\n            flex-direction: column;\n            padding: 50px 64px;\n            box-sizing: border-box;\n        }\n        .keyword-badge {\n            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);\n            display: inline-block;\n            padding: 8px 24px;\n            border-radius: 20px;\n            font-size: 18px;\n            font-weight: 600;\n            color: white;\n            letter-spacing: 2px;\n            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);\n            border-left: 6px solid #f59e0b;\n            padding: 20px 24px;\n            border-radius: 12px;\n            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.2);\n        }\n        .concept-card {\n            background: #f8fafc;\n            border: 2px solid #e2e8f0;\n            border-radius: 16px;\n            padding: 24px;\n            transition: all 0.3s ease;\n        }\n        .concept-card:hover {\n            border-color: #3b82f6;\n            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.15);\n            transform: translateY(-4px);\n        }\n        .concept-number {\n            width: 56px;\n            height: 56px;\n            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);\n            color: white;\n            border-radius: 50%;\n            display: flex;\n            align-items: center;\n            justify-content: center;\n            font-size: 24px;\n            font-weight: 700;\n            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);\n            margin-bottom: 16px;\n        }\n    </style>\n</head>\n<body>\n    <div class=\"slide-container\">\n        <!-- Header Section -->\n        <div class=\"mb-8\">\n            <div class=\"flex items-center justify-between mb-4\">\n                <h1 class=\"text-5xl font-bold text-slate-800 tracking-tight\" data-editable=\"text\">Registro en Pladicop</h1>\n                <div class=\"keyword-badge\">REGISTRO</div>\n            </div>\n        </div>\n        \n        <!-- Mnemonic Trick Box -->\n        <div class=\"mnemonic-box mb-8\">\n            <div class=\"flex items-center gap-3\">\n                <svg class=\"w-8 h-8 text-amber-600\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                    <path d=\"M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z\"></path>\n                </svg>\n                <div>\n                    <div class=\"text-sm font-semibold text-amber-800 mb-1\">💡 Truco Mnemotécnico</div>\n                    <div class=\"text-2xl font-bold text-amber-900\">V-D-A = Vincular - Documentos - Aprobación</div>\n                </div>\n            </div>\n        </div>\n\n        <!-- 3 Key Concepts -->\n        <div class=\"grid grid-cols-3 gap-6 flex-1\">\n            \n            <!-- Concept 1: Vincular con PAC -->\n            <div class=\"concept-card\">\n                <div class=\"concept-number\">V</div>\n                <h2 class=\"text-2xl font-bold mb-4 text-slate-800\" data-editable=\"text\">Vincular con PAC</h2>\n                <p class=\"text-slate-600 text-base leading-relaxed mb-4\" data-editable=\"text\">\n                    Establezca la conexión directa entre el proceso de contratación y el Plan Anual de Contrataciones (PAC) aprobado por la entidad.\n                </p>\n                <div class=\"bg-blue-50 border-l-4 border-blue-500 p-3 rounded\">\n                    <p class=\"text-sm text-blue-800 font-medium\">✓ Verificar código PAC</p>\n                    <p class=\"text-sm text-blue-800 font-medium\">✓ Validar presupuesto</p>\n                </div>\n            </div>\n\n            <!-- Concept 2: Registrar documentos de soporte -->\n            <div class=\"concept-card\">\n                <div class=\"concept-number\">D</div>\n                <h2 class=\"text-2xl font-bold mb-4 text-slate-800\" data-editable=\"text\">Registrar Documentos de Soporte</h2>\n                <p class=\"text-slate-600 text-base leading-relaxed mb-4\" data-editable=\"text\">\n                    Adjunte y registre toda la documentación técnica, legal y administrativa que sustenta el proceso de contratación.\n                </p>\n                <div class=\"bg-green-50 border-l-4 border-green-500 p-3 rounded\">\n                    <p class=\"text-sm text-green-800 font-medium\">✓ TDR o especificaciones</p>\n                    <p class=\"text-sm text-green-800 font-medium\">✓ Certificación presupuestal</p>\n                </div>\n            </div>\n\n            <!-- Concept 3: Ingresar datos de aprobación -->\n            <div class=\"concept-card\">\n                <div class=\"concept-number\">A</div>\n                <h2 class=\"text-2xl font-bold mb-4 text-slate-800\" data-editable=\"text\">Ingresar Datos de Aprobación</h2>\n                <p class=\"text-slate-600 text-base leading-relaxed mb-4\" data-editable=\"text\">\n                    Complete la información relacionada con las autorizaciones y aprobaciones oficiales del proceso por las autoridades competentes.\n                </p>\n                <div class=\"bg-purple-50 border-l-4 border-purple-500 p-3 rounded\">\n                    <p class=\"text-sm text-purple-800 font-medium\">✓ Resolución de aprobación</p>\n                    <p class=\"text-sm text-purple-800 font-medium\">✓ Fecha y firma autorizada</p>\n                </div>\n            </div>\n\n        </div>\n    </div>\n\n</body></html>","<!DOCTYPE html><html lang=\"es\"><head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Custodia del Expediente</title>\n    <script src=\"assets/3fa48481346f.js\"><\/script>\n    <style>\n        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');\n        body {\n            font-family: 'Inter', sans-serif;\n            margin: 0;\n            padding: 0;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            min-height: 100vh;\n            background-color: #f3f4f6;\n        }\n        .keyword-highlight {\n            background: linear-gradient(120deg, #fbbf24 0%, #f59e0b 100%);\n            padding: 8px 24px;\n            border-radius: 12px;\n            display: inline-block;\n            box-shadow: 0 4px 6px rgba(245, 158, 11, 0.2);\n        }\n        .mnemonic-box {\n            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);\n            border-radius: 16px;\n            padding: 20px 32px;\n            box-shadow: 0 8px 16px rgba(139, 92, 246, 0.3);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"w-[1280px] h-[720px] bg-white relative p-12 flex flex-col gap-8 shadow-xl box-border\">\n        \n        <!-- Page Title with Keyword -->\n        <div class=\"flex items-center justify-between\">\n            <h1 class=\"text-5xl font-bold text-slate-900 tracking-tight\" data-editable=\"text\">\n                Custodia del Expediente\n            </h1>\n            <div class=\"keyword-highlight\">\n                <span class=\"text-2xl font-bold text-white tracking-wide\">RESPONSABILIDAD</span>\n            </div>\n        </div>\n\n        <!-- Main Content -->\n        <main class=\"flex-1 flex flex-col gap-6\">\n            <p class=\"text-xl text-slate-600 max-w-4xl leading-relaxed\" data-editable=\"text\">\n                La correcta gestión y protección de los documentos requiere responsabilidades claramente definidas. Estos son los 3 conceptos clave:\n            </p>\n\n            <div class=\"grid grid-cols-3 gap-6\">\n                <!-- Concepto 1: DEC organiza y mantiene -->\n                <div class=\"border-2 border-blue-200 bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl p-6 flex flex-col gap-3\">\n                    <div class=\"w-[56px] h-[56px] bg-blue-500 text-white rounded-full flex items-center justify-center mb-1 font-bold text-2xl shadow-lg\">\n                        D\n                    </div>\n                    <h2 class=\"text-2xl font-bold text-blue-900\" data-editable=\"text\">DEC Organiza y Mantiene</h2>\n                    <p class=\"text-base text-slate-700 leading-relaxed\" data-editable=\"text\">\n                        El Departamento de Expedientes y Correspondencia es responsable de organizar, clasificar y mantener la custodia física de todos los expedientes institucionales.\n                    </p>\n                    <div class=\"mt-2 bg-blue-200 rounded-lg p-3\">\n                        <p class=\"text-sm font-semibold text-blue-900\">✓ Organización sistemática</p>\n                        <p class=\"text-sm font-semibold text-blue-900\">✓ Custodia física segura</p>\n                    </div>\n                </div>\n\n                <!-- Concepto 2: Área usuaria garantiza veracidad -->\n                <div class=\"border-2 border-emerald-200 bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-xl p-6 flex flex-col gap-3\">\n                    <div class=\"w-[56px] h-[56px] bg-emerald-500 text-white rounded-full flex items-center justify-center mb-1 font-bold text-2xl shadow-lg\">\n                        A\n                    </div>\n                    <h2 class=\"text-2xl font-bold text-emerald-900\" data-editable=\"text\">Área Usuaria Garantiza Veracidad</h2>\n                    <p class=\"text-base text-slate-700 leading-relaxed\" data-editable=\"text\">\n                        Cada área usuaria es responsable de garantizar la autenticidad, veracidad y exactitud de la información contenida en los documentos que genera y remite.\n                    </p>\n                    <div class=\"mt-2 bg-emerald-200 rounded-lg p-3\">\n                        <p class=\"text-sm font-semibold text-emerald-900\">✓ Autenticidad de datos</p>\n                        <p class=\"text-sm font-semibold text-emerald-900\">✓ Veracidad del contenido</p>\n                    </div>\n                </div>\n\n                <!-- Concepto 3: Control de versiones -->\n                <div class=\"border-2 border-purple-200 bg-gradient-to-br from-purple-50 to-purple-100 rounded-xl p-6 flex flex-col gap-3\">\n                    <div class=\"w-[56px] h-[56px] bg-purple-500 text-white rounded-full flex items-center justify-center mb-1 font-bold text-2xl shadow-lg\">\n                        V\n                    </div>\n                    <h2 class=\"text-2xl font-bold text-purple-900\" data-editable=\"text\">Control de Versiones</h2>\n                    <p class=\"text-base text-slate-700 leading-relaxed\" data-editable=\"text\">\n                        Es fundamental mantener un control riguroso de las versiones de documentos, registrando cada modificación, actualización y revisión para garantizar la trazabilidad completa.\n                    </p>\n                    <div class=\"mt-2 bg-purple-200 rounded-lg p-3\">\n                        <p class=\"text-sm font-semibold text-purple-900\">✓ Registro de cambios</p>\n                        <p class=\"text-sm font-semibold text-purple-900\">✓ Trazabilidad total</p>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Mnemonic Trick -->\n            <div class=\"mnemonic-box mt-2\">\n                <div class=\"flex items-center j >"];
        var iframe = document.getElementById('slideFrame');
        var total = SLIDES.length;
        var current = 0;
        var WIDTH = 1280;
        var HEIGHT = 720;

        function fitScale() {
          if (!iframe) return;
          var scale = Math.min(window.innerWidth / WIDTH, window.innerHeight / HEIGHT);
          iframe.style.transform = 'scale(' + scale + ')';
          iframe.style.transformOrigin = 'center center';
        }

        function show(index) {
          if (index < 0 || index >= total) return;
          current = index;
          iframe.srcdoc = SLIDES[current];
          fitScale();
        }

        function enterFullscreen() {
          var el = document.documentElement;
          (el.requestFullscreen || el.webkitRequestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen).call(el);
        }

        function exitFullscreen() {
          var doc = document;
          (doc.exitFullscreen || doc.webkitExitFullscreen || doc.webkitCancelFullScreen || doc.mozCancelFullScreen || doc.msExitFullscreen).call(doc);
        }

        function showFullscreenHint() {
          trigger.classList.remove('ready');
        }

        function hideFullscreenHint() {
          trigger.classList.add('ready');
        }

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            exitFullscreen();
            return;
          }
          var trigger = document.getElementById('fullscreenTrigger');
          if (!trigger.classList.contains('ready')) return;
          if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { if (current > 0) show(current - 1); e.preventDefault(); }
          if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (current < total - 1) show(current + 1); e.preventDefault(); }
        });

        function onFullscreenChange() {
          var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
          if (isFs) hideFullscreenHint();
          else showFullscreenHint();
        }
        document.addEventListener('fullscreenchange', onFullscreenChange);
        document.addEventListener('webkitfullscreenchange', onFullscreenChange);
        document.addEventListener('mozfullscreenchange', onFullscreenChange);
        document.addEventListener('MSFullscreenChange', onFullscreenChange);

        var trigger = document.getElementById('fullscreenTrigger');
        var overlay = document.getElementById('fullscreenOverlay');
        overlay.addEventListener('click', function(e) {
          if (trigger.classList.contains('ready')) {
            var mid = window.innerWidth / 2;
            if (e.clientX < mid) { if (current > 0) show(current - 1); }
            else { if (current < total - 1) show(current + 1); }
          } else if (e.target === trigger || trigger.contains(e.target)) {
            enterFullscreen();
          }
        });

        window.addEventListener('resize', fitScale);

        show(0);
      })();
